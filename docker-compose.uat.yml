version: '3.8'
services:
  api:
    build:
      context: .
      dockerfile: packages/api/Dockerfile
      target: staging
    environment:
      - NODE_ENV=uat
      - DATABASE_URL=postgresql://atlas:atlas@db:5432/atlas_uat
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - JWT_SECRET=${JWT_SECRET}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
    ports:
      - "3010:3000"
    depends_on:
      - db
      - redis
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3

  web:
    build:
      context: .
      dockerfile: packages/web/Dockerfile
      target: staging
    environment:
      - VITE_API_URL=http://api:3000/v1
    ports:
      - "3011:80"
    depends_on:
      - api

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: atlas
      POSTGRES_PASSWORD: atlas
      POSTGRES_DB: atlas_uat
    volumes:
      - uat_pgdata:/var/lib/postgresql/data
    ports:
      - "5434:5432"

  redis:
    image: redis:7-alpine
    ports:
      - "6381:6379"

volumes:
  uat_pgdata:
